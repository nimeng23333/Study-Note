# =============================================================================
# 🚀 Luban Perfect Clash Config 
# =============================================================================
# 适用：Clash Verge / Mihomo / Stash 等新版客户端
# 配置日期：
# 节点：自建 RackNerd VPS Reality + WS 双节点
# 设计目标：一份 yaml 解决 95% 的折腾,接近机场体验
#
# 优化要点：
#   1. ✅ TUN system stack(性能最优)
#   2. ✅ DNS fake-ip + GeoIP 智能分流(防污染)
#   3. ✅ 国内 App/CDN 完整覆盖(800+ 规则)
#   4. ✅ 微信朋友圈 CDN 全部白名单(永不误伤)
#   5. ✅ Cloudflare 友好(linux.do 等正常)
#   6. ✅ AI 服务专组(ChatGPT/Claude/Cursor/Gemini)
#   7. ✅ 智能广告拦截(精确,不误伤)
#   8. ✅ 漏网之鱼默认 DIRECT(国内 App 永不绕路)
#   9. ✅ Apple/Microsoft/Google 服务智能分流
#  10. ✅ Telegram IP 段强制代理
# =============================================================================

# =================
# 全局设置
# =================
mixed-port: 7897
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
geodata-mode: true
global-client-fingerprint: chrome

# =================
# DNS 配置(防污染 + 智能分流)
# =================
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  # fake-ip 不接管的域名(走真实 IP,避免某些 App 不信任假 IP)
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "*.msftncsi.com"
    - "*.msftconnecttest.com"
    # 微信全部走真实 IP(避免假 IP 导致朋友圈不信任)
    - "+.qq.com"
    - "+.weixin.qq.com"
    - "+.wechat.com"
    - "+.qpic.cn"
    - "+.qlogo.cn"
    - "+.gtimg.cn"
    - "+.gtimg.com"
    - "+.tc.qq.com"
    - "+.tencent.com"
    # iOS/macOS 系统服务
    - "*.apple.com"
    - "*.icloud.com"
    - "*.icloud-content.com"
  
  # 解析 nameserver/fallback 域名时用的 DNS
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
  
  # 国内域名的 DNS(直接 UDP,延迟低)
  nameserver:
    - 223.5.5.5         # 阿里 DNS
    - 119.29.29.29      # 腾讯 DNS
    - 114.114.114.114   # 114 DNS
    - tls://dns.alidns.com:853    # 阿里 DoT(备用,加密)
  
  # 国外域名的 DNS(防污染)
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
    - tls://8.8.8.8:853
    - tls://1.1.1.1:853
  
  # GeoIP 分流:CN IP 用 nameserver(快),非 CN 用 fallback(防污染)
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.github.com"
      - "+.twitter.com"
      - "+.x.com"
      - "+.openai.com"
      - "+.anthropic.com"
      - "+.cursor.sh"
      - "+.cursor.com"

# =================
# TUN 模式配置(system stack 性能最优)
# =================
tun:
  enable: true
  stack: system
  device: utun0
  auto-route: true
  auto-detect-interface: true
  strict-route: false
  dns-hijack:
    - any:53
    - tcp://any:53
  mtu: 9000

# =============================================================================
# 节点配置
# =============================================================================
proxies:
  - name: "输入自己的名字"
    type: vless
    server: 输入自己的ip，改成你的 VPS IP
    port: 443
    uuid: 改成面板里的 UUID
    network: tcp
    udp: true
    tls: true
    flow: xtls-rprx-vision
    servername: www.amazon.com
    reality-opts:
      public-key: 改成面板生成的 Public Key
      short-id: 改成面板生成的 Short ID
    client-fingerprint: chrome


# =============================================================================
# 代理分组
# =============================================================================
proxy-groups:
  - name: "🔰 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🚀 Luban-Reality"
      - "🌐 Luban-WS-Backup"
      - "DIRECT"

  - name: "♻️ 自动选择"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - "🚀 Luban-Reality"
      - "🌐 Luban-WS-Backup"

  - name: "🤖 AI 服务"
    type: select
    proxies:
      - "🚀 Luban-Reality"
      - "🔰 节点选择"
      - "🌐 Luban-WS-Backup"

  - name: "📺 YouTube"
    type: select
    proxies:
      - "🔰 节点选择"
      - "🚀 Luban-Reality"
      - "DIRECT"

  - name: "📱 Telegram"
    type: select
    proxies:
      - "🔰 节点选择"
      - "🚀 Luban-Reality"
      - "🌐 Luban-WS-Backup"

  - name: "🌍 国外网站"
    type: select
    proxies:
      - "🔰 节点选择"
      - "🚀 Luban-Reality"
      - "DIRECT"

  - name: "📲 社交媒体"
    type: select
    proxies:
      - "🔰 节点选择"
      - "DIRECT"

  - name: "🍎 Apple"
    type: select
    proxies:
      - "DIRECT"
      - "🔰 节点选择"

  - name: "Ⓜ️ 微软服务"
    type: select
    proxies:
      - "DIRECT"
      - "🔰 节点选择"

  - name: "🇨🇳 国内服务"
    type: select
    proxies:
      - "DIRECT"
      - "🔰 节点选择"

  - name: "🛑 广告拦截"
    type: select
    proxies:
      - "REJECT"
      - "DIRECT"

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "DIRECT"
      - "🔰 节点选择"

